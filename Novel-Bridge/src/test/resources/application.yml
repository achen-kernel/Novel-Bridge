# Test profile: use H2 in-memory instead of MySQL, disable Flyway
spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  sql:
    init:
      mode: never

mybatis:
  configuration:
    map-underscore-to-camel-case: true

novelbridge:
  rag-agent:
    base-url: http://localhost:18081
    timeout: 5000
