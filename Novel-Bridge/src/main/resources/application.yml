server:
  port: 8080

spring:
  application:
    name: novel-bridge
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
  datasource:
    url: jdbc:mysql://localhost:13306/novel_bridge?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai
    username: novel_bridge
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.achen.novelbridge.pojo.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

novelbridge:
  rag-agent:
    base-url: http://localhost:18081
    timeout: 5000
    book-process-url: ${RAG_AGENT_BOOK_PROCESS_URL:http://localhost:18081/api/books/{bookId}/process}
    fact-extract-url: ${RAG_AGENT_FACT_EXTRACT_URL:http://localhost:18081/api/books/{bookId}/extract}
    qa-url: ${RAG_AGENT_QA_URL:http://localhost:18081/api/qa/ask}
