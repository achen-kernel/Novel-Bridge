<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovelBridge</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<style>
/* ══════════════════════════════════════════════════════════════
   Design System
   ══════════════════════════════════════════════════════════════ */
:root {
  --color-bg:        #f0f2f5;
  --color-surface:   #ffffff;
  --color-dark:      #1a1a2e;
  --color-dark-soft: #25254a;
  --color-accent:    #4a6cf7;
  --color-accent-hover: #3b5de7;
  --color-accent-light: #eef1ff;
  --color-text:      #1e293b;
  --color-text-soft: #475569;
  --color-text-muted:#94a3b8;
  --color-border:    #e2e8f0;
  --color-border-subtle: #f1f5f9;
  --color-danger:    #ef4444;
  --color-danger-hover: #dc2626;
  --color-danger-bg: #fef2f2;
  --color-success:   #10b981;

  --radius-sm:  6px;
  --radius-md:  10px;
  --radius-lg:  16px;

  --shadow-sm:  0 1px 2px rgba(0,0,0,.04);
  --shadow-md:  0 4px 12px rgba(0,0,0,.06);
  --shadow-lg:  0 12px 32px rgba(0,0,0,.10);
  --shadow-glow: 0 0 0 3px rgba(74,108,247,.12);

  --transition-fast:   150ms cubic-bezier(.4,0,.2,1);
  --transition-smooth: 250ms cubic-bezier(.4,0,.2,1);
}

/* ══════════════════════════════════════════════════════════════
   Reset & Base
   ══════════════════════════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  height: 100vh;
  background: var(--color-bg);
  color: var(--color-text);
  overflow: hidden;           /* no body-level scroll — only inner panels */
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;              /* critical: fills viewport so child flex:1 works */
}

/* ══════════════════════════════════════════════════════════════
   Header
   ══════════════════════════════════════════════════════════════ */
header {
  flex-shrink: 0;
  background: linear-gradient(135deg, var(--color-dark) 0%, #16213e 100%);
  color: #fff;
  padding: 16px 28px;
  font-size: 19px;
  font-weight: 700;
  letter-spacing: .3px;
  box-shadow: 0 2px 16px rgba(0,0,0,.18);
  z-index: 20;
  display: flex;
  align-items: center;
  gap: 10px;
}

header::before {
  content: "";
  display: inline-block;
  width: 9px;
  height: 9px;
  background: var(--color-accent);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--color-accent);
  flex-shrink: 0;
}

/* ══════════════════════════════════════════════════════════════
   Three-Column Container — fills remaining height, no gaps
   ══════════════════════════════════════════════════════════════ */
.container {
  display: flex;
  flex: 1;
  min-height: 0;              /* allows children to shrink & scroll */
  overflow: hidden;
}

/* ── Sidebar (Books) ────────────────────────────────────────── */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--color-surface);
  border-right: 1px solid var(--color-border);
  display: flex;
  flex-direction: column;
}

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--color-border);
}

.sidebar-header button {
  width: 100%;
  padding: 10px 0;
  background: var(--color-accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: all var(--transition-fast);
  box-shadow: 0 2px 6px rgba(74,108,247,.22);
  letter-spacing: .2px;
}

.sidebar-header button:hover {
  background: var(--color-accent-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(74,108,247,.32);
}

.sidebar-header button:active {
  transform: translateY(0);
}

/* scrollable book list */
.book-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
  scrollbar-width: thin;
  scrollbar-color: var(--color-border) transparent;
}

.book-list::-webkit-scrollbar {
  width: 5px;
}

.book-list::-webkit-scrollbar-thumb {
  background: var(--color-border);
  border-radius: 3px;
}

.book-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 13px 16px;
  margin: 2px 8px;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--transition-fast);
  border-left: 3px solid transparent;
}

.book-item:hover {
  background: #f8fafc;
  border-left-color: var(--color-border);
}

.book-item.active {
  background: var(--color-accent-light);
  border-left-color: var(--color-accent);
  box-shadow: var(--shadow-sm);
}

.book-item.active:hover {
  background: #e2e7ff;
}

.book-info { flex: 1; min-width: 0; }

.book-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--color-text);
  line-height: 1.4;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color var(--transition-fast);
}

.book-item.active .book-title {
  color: var(--color-accent);
}

.book-meta {
  font-size: 11px;
  color: var(--color-text-muted);
  margin-top: 3px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.book-meta::before {
  content: "";
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--color-success);
  border-radius: 50%;
  flex-shrink: 0;
}

.delete-btn {
  font-size: 18px;
  color: var(--color-text-muted);
  cursor: pointer;
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  transition: all var(--transition-fast);
  opacity: 0;
  line-height: 1;
  flex-shrink: 0;
}

.book-item:hover .delete-btn {
  opacity: 1;
}

.delete-btn:hover {
  color: var(--color-danger);
  background: var(--color-danger-bg);
}

/* ── Chat (Center) ──────────────────────────────────────────── */
.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--color-surface);
  min-width: 0;              /* prevent flex overflow */
}

.empty-state {
  display: flex;
  flex: 1;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--color-text-muted);
  font-size: 15px;
  gap: 14px;
  user-select: none;
}

.empty-state::before {
  content: "💬";
  font-size: 48px;
  opacity: .25;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  scrollbar-width: thin;
  scrollbar-color: var(--color-border) transparent;
}

.messages::-webkit-scrollbar {
  width: 5px;
}

.messages::-webkit-scrollbar-thumb {
  background: var(--color-border);
  border-radius: 3px;
}

.msg {
  max-width: 72%;
  animation: msgIn .35s cubic-bezier(.4,0,.2,1);
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg.user { align-self: flex-end; }
.msg.assistant { align-self: flex-start; }

.msg + .msg { margin-top: 2px; }

.msg-bubble {
  padding: 12px 18px;
  border-radius: var(--radius-lg);
  line-height: 1.65;
  font-size: 14px;
  white-space: pre-wrap;
  word-break: break-word;
}

.msg.user .msg-bubble {
  background: linear-gradient(135deg, var(--color-accent) 0%, #3b5de7 100%);
  color: #fff;
  border-bottom-right-radius: var(--radius-sm);
  box-shadow: 0 2px 10px rgba(74,108,247,.28);
}

.msg.assistant .msg-bubble {
  background: #f8fafc;
  color: var(--color-text);
  border: 1px solid var(--color-border-subtle);
  border-bottom-left-radius: var(--radius-sm);
  box-shadow: var(--shadow-sm);
}

/* ── Input Bar ──────────────────────────────────────────────── */
.input-area {
  display: flex;
  padding: 16px 20px;
  border-top: 1px solid var(--color-border);
  gap: 10px;
  background: #fafbfd;
  flex-shrink: 0;
}

.input-area input {
  flex: 1;
  padding: 11px 16px;
  border: 2px solid var(--color-border);
  border-radius: var(--radius-md);
  font-size: 14px;
  outline: none;
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
  background: var(--color-surface);
  color: var(--color-text);
}

.input-area input::placeholder {
  color: var(--color-text-muted);
}

.input-area input:focus {
  border-color: var(--color-accent);
  box-shadow: var(--shadow-glow);
}

.input-area button {
  padding: 11px 26px;
  background: var(--color-accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: all var(--transition-fast);
  box-shadow: 0 2px 6px rgba(74,108,247,.22);
  white-space: nowrap;
  letter-spacing: .2px;
}

.input-area button:hover:not(:disabled) {
  background: var(--color-accent-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(74,108,247,.32);
}

.input-area button:active:not(:disabled) {
  transform: translateY(0);
}

.input-area button:disabled {
  opacity: .5;
  cursor: not-allowed;
}

/* ── Citations (Right) ──────────────────────────────────────── */
.citations {
  width: 300px;
  flex-shrink: 0;
  background: #f9fafb;
  border-left: 1px solid var(--color-border);
  padding: 20px 16px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--color-border) transparent;
}

.citations::-webkit-scrollbar {
  width: 4px;
}

.citations::-webkit-scrollbar-thumb {
  background: var(--color-border);
  border-radius: 2px;
}

.citations h3 {
  font-size: 11px;
  color: var(--color-text-muted);
  margin-bottom: 16px;
  text-transform: uppercase;
  letter-spacing: 1.8px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}

.citations h3::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--color-border);
}

.citation-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 15px 16px;
  margin-bottom: 10px;
  transition: all var(--transition-fast);
  box-shadow: var(--shadow-sm);
}

.citation-card:hover {
  box-shadow: var(--shadow-md);
  border-color: var(--color-accent);
  transform: translateY(-1px);
}

.citation-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--color-dark);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.citation-excerpt {
  font-size: 12px;
  color: var(--color-text-soft);
  line-height: 1.7;
  font-style: italic;
  padding-left: 12px;
  border-left: 2px solid var(--color-border);
}

.citation-score {
  font-size: 11px;
  color: var(--color-text-muted);
  margin-top: 10px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.citation-score::before {
  content: "";
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 3px;
  background: var(--color-accent);
  opacity: .7;
}

.empty-citations {
  color: var(--color-text-muted);
  font-size: 13px;
  text-align: center;
  margin-top: 60px;
  opacity: .65;
  user-select: none;
}

.empty-citations::before {
  content: "📚";
  display: block;
  font-size: 32px;
  margin-bottom: 12px;
  opacity: .35;
}

/* ══════════════════════════════════════════════════════════════
   Modals
   ══════════════════════════════════════════════════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,.50);
  backdrop-filter: blur(5px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: fadeIn .20s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.modal {
  background: var(--color-surface);
  border-radius: var(--radius-lg);
  padding: 28px 30px;
  width: 440px;
  max-width: 92vw;
  box-shadow: var(--shadow-lg);
  animation: modalIn .25s cubic-bezier(.4,0,.2,1);
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(.94) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.modal h3 {
  margin-bottom: 20px;
  font-size: 18px;
  font-weight: 700;
  color: var(--color-text);
}

.modal p {
  margin-bottom: 20px;
  color: var(--color-text-soft);
  line-height: 1.7;
  font-size: 14px;
}

.modal input {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid var(--color-border);
  border-radius: var(--radius-md);
  font-size: 14px;
  margin-bottom: 20px;
  outline: none;
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
  color: var(--color-text);
}

.modal input:focus {
  border-color: var(--color-accent);
  box-shadow: var(--shadow-glow);
}

.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.modal-actions button {
  padding: 10px 22px;
  border-radius: var(--radius-md);
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: all var(--transition-fast);
  letter-spacing: .2px;
}

.btn-primary {
  background: var(--color-accent);
  color: #fff;
  box-shadow: 0 2px 6px rgba(74,108,247,.22);
}

.btn-primary:hover:not(:disabled) {
  background: var(--color-accent-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(74,108,247,.32);
}

.btn-primary:disabled {
  opacity: .5;
  cursor: not-allowed;
}

.btn-danger {
  background: var(--color-danger);
  color: #fff;
  box-shadow: 0 2px 6px rgba(239,68,68,.22);
}

.btn-danger:hover {
  background: var(--color-danger-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(239,68,68,.32);
}

.btn-cancel {
  background: #f1f5f9;
  color: var(--color-text-soft);
  border: 1px solid var(--color-border);
}

.btn-cancel:hover {
  background: #e2e8f0;
  color: var(--color-text);
}
</style>
</head>
<body>
<div id="app">
  <header>NovelBridge</header>
  <div class="container">
    <!-- ═══ Left: Books ═══ -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <button @click="showImport = true">+ 导入书籍</button>
      </div>
      <div class="book-list">
        <div
          v-for="book in books"
          :key="book.id"
          class="book-item"
          :class="{ active: selectedBook && selectedBook.id === book.id }"
          @click="selectBook(book)"
        >
          <div class="book-info">
            <div class="book-title">{{ book.title }}</div>
            <div class="book-meta">{{ book.status }} · {{ book.totalChapters || 0 }} 章</div>
          </div>
          <span class="delete-btn" @click.stop="deleteTarget = book">&times;</span>
        </div>
      </div>
    </aside>

    <!-- ═══ Center: Chat ═══ -->
    <main class="chat">
      <div v-if="!selectedBook" class="empty-state">请选择一本书开始问答</div>
      <template v-else>
        <div class="messages" ref="msgContainer">
          <div
            v-for="(msg, i) in messages"
            :key="i"
            class="msg"
            :class="msg.role.toLowerCase()"
          >
            <div class="msg-bubble">{{ msg.content }}</div>
          </div>
        </div>
        <div class="input-area">
          <input
            v-model="question"
            placeholder="输入你的问题…"
            @keyup.enter="sendMessage"
            :disabled="sending"
          >
          <button
            @click="sendMessage"
            :disabled="sending || !question.trim()"
          >{{ sending ? '…' : '发送' }}</button>
        </div>
      </template>
    </main>

    <!-- ═══ Right: Citations ═══ -->
    <aside class="citations">
      <h3>引用来源</h3>
      <div v-if="currentCitations.length === 0" class="empty-citations">暂无引用</div>
      <div v-for="(c, i) in currentCitations" :key="i" class="citation-card">
        <div class="citation-title">第{{ c.chapterNumber }}回「{{ c.chapterTitle }}」</div>
        <div class="citation-excerpt">{{ c.excerpt }}</div>
        <div class="citation-score">相关度：{{ Math.round(c.relevanceScore * 100) }}%</div>
      </div>
    </aside>
  </div>

  <!-- ═══ Import Modal ═══ -->
  <div v-if="showImport" class="modal-overlay" @click.self="showImport = false">
    <div class="modal">
      <h3>导入书籍</h3>
      <input v-model="importPath" placeholder="book-test/西游记.txt" @keyup.enter="doImport">
      <div class="modal-actions">
        <button class="btn-cancel" @click="showImport = false">取消</button>
        <button class="btn-primary" @click="doImport" :disabled="!importPath.trim()">导入</button>
      </div>
    </div>
  </div>

  <!-- ═══ Delete Confirm Modal ═══ -->
  <div v-if="deleteTarget" class="modal-overlay" @click.self="deleteTarget = null">
    <div class="modal">
      <h3>确认删除</h3>
      <p>确定要删除《{{ deleteTarget.title }}》吗？相关的章节、任务记录、问答数据将一并删除。</p>
      <div class="modal-actions">
        <button class="btn-cancel" @click="deleteTarget = null">取消</button>
        <button class="btn-danger" @click="doDelete">确认删除</button>
      </div>
    </div>
  </div>
</div>

<script>
const { createApp, ref, computed, nextTick } = Vue;

createApp({
  setup() {
    const books = ref([]);
    const selectedBook = ref(null);
    const sessionId = ref(null);
    const messages = ref([]);
    const question = ref('');
    const sending = ref(false);
    const showImport = ref(false);
    const importPath = ref('');
    const deleteTarget = ref(null);
    const currentCitations = ref([]);

    function loadBooks() {
      fetch('/api/books')
        .then(r => r.json())
        .then(res => { if (res.code === 1) books.value = res.data; });
    }

    function selectBook(book) {
      selectedBook.value = book;
      messages.value = [];
      currentCitations.value = [];
      sessionId.value = null;
      fetch('/api/chat/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bookId: book.id, title: book.title })
      })
      .then(r => r.json())
      .then(res => {
        if (res.code === 1) sessionId.value = res.data.id;
      });
    }

    function sendMessage() {
      const q = question.value.trim();
      if (!q || sending.value) return;
      sending.value = true;
      const oldQ = q;
      question.value = '';
      messages.value.push({ role: 'USER', content: oldQ });
      currentCitations.value = [];

      fetch(`/api/chat/sessions/${sessionId.value}/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: oldQ })
      })
      .then(r => r.json())
      .then(res => {
        if (res.code === 1) {
          messages.value.push({ role: 'ASSISTANT', content: res.data.content });
          if (res.data.citations) {
            currentCitations.value = res.data.citations.map(c => ({
              chapterNumber: c.sourceId,
              chapterTitle: '',
              excerpt: c.excerpt || '',
              relevanceScore: c.relevanceScore || 0
            }));
          }
          nextTick(() => {
            const el = document.querySelector('.messages');
            if (el) el.scrollTop = el.scrollHeight;
          });
        }
      })
      .finally(() => { sending.value = false; });
    }

    function doImport() {
      const path = importPath.value.trim();
      if (!path) return;
      fetch('/api/books', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filePath: path })
      })
      .then(r => r.json())
      .then(res => {
        if (res.code === 1) {
          const id = res.data.id;
          return fetch(`/api/books/${id}/build`, { method: 'POST' });
        }
      })
      .then(r => r ? r.json() : null)
      .then(res => {
        if (res && res.code === 1) {
          showImport.value = false;
          importPath.value = '';
          loadBooks();
        }
      });
    }

    function doDelete() {
      const book = deleteTarget.value;
      if (!book) return;
      fetch(`/api/books/${book.id}`, { method: 'DELETE' })
        .then(r => r.json())
        .then(res => {
          if (res.code === 1) {
            if (selectedBook.value && selectedBook.value.id === book.id) {
              selectedBook.value = null;
              messages.value = [];
              currentCitations.value = [];
              sessionId.value = null;
            }
            deleteTarget.value = null;
            loadBooks();
          }
        });
    }

    loadBooks();

    return { books, selectedBook, messages, question, sending, showImport, importPath, deleteTarget, currentCitations, selectBook, sendMessage, doImport, doDelete };
  }
}).mount('#app');
</script>
</body>
</html>
