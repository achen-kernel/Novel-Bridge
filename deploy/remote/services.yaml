# ============================================================
# NovelBridge — 远程服务定义元数据
# 描述每个服务的启动命令、停止命令、健康检查方式和依赖
# 供 nb_up.sh / nb_down.sh / nb_healthcheck.sh 等脚本使用
# 目录结构对齐 docs/learn_remote/remote-server-structure.md
# ============================================================

services:
  mysql:
    description: "MySQL 数据库 (Docker)"
    port_env: MYSQL_PORT
    default_port: 13306
    start: "docker compose up -d mysql"
    stop: "docker compose down mysql"
    health:
      type: tcp
      host: 127.0.0.1
    depends_on: []
    stage: real
    data_dir: "${MYSQL_DATA_DIR:-/home/wk/novelbridge/data/mysql}"

  neo4j:
    description: "Neo4j 图数据库 (Docker)"
    port_env: NEO4J_BOLT_PORT
    default_port: 17687
    start: "docker compose up -d neo4j"
    stop: "docker compose down neo4j"
    health:
      type: http
      url: "http://127.0.0.1:17474"
    depends_on: []
    stage: real
    data_dir: "${NEO4J_DATA_DIR:-/home/wk/novelbridge/data/neo4j}"

  chroma:
    description: "Chroma 向量数据库（内嵌在 rag-agent 中）"
    port_env: null
    default_port: null
    start: "自动随 rag-agent 启动"
    stop: "自动随 rag-agent 停止"
    health:
      type: embedded
      note: "Chroma 通过 Python 内嵌模式运行，数据持久化在 /home/wk/novelbridge/data/chroma"
    depends_on: []
    stage: real
    data_dir: "${CHROMA_DATA_DIR:-/home/wk/novelbridge/data/chroma}"

  llama-server:
    description: "llama.cpp OpenAI-compatible server（原生二进制）"
    port_env: LLAMA_PORT
    default_port: 18080
    start: "nohup llama-server --host 127.0.0.1 --port $LLAMA_PORT -m $LLAMA_MODEL_PATH --ctx-size 8192 --no-mmap > $LOG_DIR/llama.cpp/llama-server.log 2>&1 &"
    stop: "pkill -f 'llama-server.*--port $LLAMA_PORT' || true"
    health:
      type: http
      url: "http://127.0.0.1:18080/health"
    depends_on: []
    stage: mock
    mock_note: "本阶段先用小模型 smoke test，后续换 Qwen3.6-35B-A3B"

  rag-agent:
    description: "Python 模型编排与检索服务"
    port_env: RAG_AGENT_PORT
    default_port: 18081
    start: "cd $RAG_AGENT_DIR && nohup python -m app.main --port $RAG_AGENT_PORT > $LOG_DIR/rag-agent/rag-agent.log 2>&1 &"
    stop: "pkill -f 'app.main.*--port $RAG_AGENT_PORT' || true"
    health:
      type: http
      url: "http://127.0.0.1:18081/health"
    depends_on:
      - mysql
      - neo4j
      - llama-server
    stage: real
