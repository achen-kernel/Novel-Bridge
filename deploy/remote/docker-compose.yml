# ============================================================
# NovelBridge — Docker Compose for Remote Linux
# Usage: docker compose up -d mysql neo4j
# ============================================================

version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: novelbridge-mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MYSQL_PORT:-13306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-novel_bridge}
    volumes:
      - ${MYSQL_DATA_DIR:-./data/mysql}:/var/lib/mysql
      - ../../Novel-Bridge/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: novelbridge-neo4j
    restart: unless-stopped
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT:-17474}:7474"
      - "127.0.0.1:${NEO4J_BOLT_PORT:-17687}:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:?NEO4J_AUTH is required (neo4j/password)}
    volumes:
      - ${NEO4J_DATA_DIR:-./data/neo4j}:/data
      - ${NEO4J_LOG_DIR:-./logs/neo4j}:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
