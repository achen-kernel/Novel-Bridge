services:
  mysql:
    image: mysql:8.4
    container_name: novelbridge-mysql
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:${MYSQL_PORT:-13306}:3306"
    volumes:
      - ${MYSQL_DATA_DIR:-/home/wk/novelbridge/data/mysql}:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password

  neo4j:
    image: neo4j:5-community
    container_name: novelbridge-neo4j
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT:-17474}:7474"
      - "127.0.0.1:${NEO4J_BOLT_PORT:-17687}:7687"
    volumes:
      - ${NEO4J_DATA_DIR:-/home/wk/novelbridge/data/neo4j}:/data

  qdrant:
    image: qdrant/qdrant
    container_name: novelbridge-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:${QDRANT_PORT:-16333}:6333"
      - "127.0.0.1:16334:6334"
    volumes:
      - ${QDRANT_DATA_DIR:-/home/wk/novelbridge/data/qdrant}:/qdrant/storage
